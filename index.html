<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> </title>
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #050505; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: #fff; }
        .stars-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%); z-index: 0; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle var(--duration) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }
        .container { text-align: center; background: rgba(20, 20, 20, 0.85); padding: 40px 25px; border-radius: 20px; box-shadow: 0 0 30px rgba(255,255,255,0.15); border: 1px solid #444; width: 85%; max-width: 450px; z-index: 10; backdrop-filter: blur(8px); }
        h1 { font-size: 1.25rem; margin-bottom: 25px; line-height: 1.8; }
        .buttons { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        button { padding: 15px 25px; border-radius: 12px; border: 1px solid #fff; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: 0.2s; width: 90%; background: transparent; color: #fff; }
        #noBtn { position: relative; width: auto; min-width: 100px; z-index: 100; user-select: none; -webkit-tap-highlight-color: transparent; }
        .balloon { position: fixed; bottom: -100px; width: 45px; height: 60px; background-color: #ff0000; border-radius: 50%; z-index: 5; animation: flyUp 12s linear infinite; }
        .balloon::after { content: ""; position: absolute; bottom: -20px; left: 22px; width: 1px; height: 20px; background: #fff; }
        @keyframes flyUp { 0% { transform: translateY(0); left: 15%; opacity: 0; } 10% { opacity: 0.8; } 100% { transform: translateY(-125vh); left: 85%; opacity: 0; } }
    </style>
</head>
<body>
    <div class="stars-container" id="stars"></div>
    <div class="balloon"></div>
    <div class="container" id="mainContainer">
        <div id="content">
            <h1>هابي بيرثداي حبيبي ❣️<br><br>اول شي بتحبني؟؟ حاول تضغط لا اذا بتقدر😁</h1>
            <div class="buttons">
                <button onclick="showFinal()">أي</button>
                <!-- لاحظي هون شلت الـ onclick تماماً واستبدلتها بـ منع كامل -->
                <button id="noBtn" onmouseover="moveButton(event)" ontouchstart="moveButton(event)">لا</button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size; star.style.height = size;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            starsContainer.appendChild(star);
        }

        function moveButton(e) {
            if (e) {
                e.preventDefault(); // بيمنع المتصفح من تنفيذ أي "نقرة"
                e.stopPropagation(); // بيمنع وصول الحدث لأي مكان تاني
            }
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - btn.offsetWidth - 30);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight - 30);
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            return false;
        }

        // زيادة تأكيد: إذا علوش حاول يضغط بأي طريقة، الزر رح يهرب بس
        document.getElementById('noBtn').addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            moveButton(e);
        });

        function showFinal() {
            document.querySelector('.balloon').style.display = 'none';
            var duration = 10 * 1000;
            var animationEnd = Date.now() + duration;
            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                confetti({ particleCount: 40, spread: 70, origin: { x: Math.random(), y: Math.random() - 0.2 }, colors: ['#ff0000', '#ffd700', '#ffffff', '#00ced1', '#ff00ff'] });
            }, 250);
            document.getElementById('content').innerHTML = `
                <div style="white-space: pre-line; line-height: 2; font-size: 1.1rem;">
                    🌟 يا أفخم مواليد مايو 👑
                    يوم ميلادك هو يوم ميلاد الأيام الحلوة بحياتي..
                    كبرت سنة وكبر حبك في قلبي سنييييين ❤️
                    كل عام وأنت الحب والخشير وأبو شريك 😂🫂
                    كل عام وأنت بخير يا وجه الخير، كل عام والدنيا ما تحلى إلا فيك وبعيونك وصوتك..
                    يا جعل عمرك جنبي كل الأعوام، ويا جعل عيد ميلادك يمر ألف عام ✨
                    <b>So lucky to have you
                    And my heart is full of you</b> 🫂❤️
                </div>`;
        }
    </script>
</body>
</html>
